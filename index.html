<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis Assistant - Advanced Voice Interface</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 100%);
    }

    #mainCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #0d1b3a 0%, #000000 100%);
    }

    .voiceIndicator {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      color: #00ff88;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
      letter-spacing: 2px;
    }

    .listeningDot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #00ff88;
      border-radius: 50%;
      margin-left: 8px;
      animation: pulse 0.8s infinite;
      box-shadow: 0 0 10px #00ff88;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 10px #00ff88;
      }
      50% {
        opacity: 0.3;
        box-shadow: 0 0 20px #00ff88;
      }
    }

    .controls {
      position: fixed;
      top: 40px;
      right: 40px;
      z-index: 1000;
      display: flex;
      gap: 15px;
    }

    .controlBtn {
      padding: 12px 24px;
      background: rgba(0, 255, 136, 0.15);
      border: 2px solid #00ff88;
      color: #00ff88;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s ease;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
      letter-spacing: 1px;
    }

    .controlBtn:hover {
      background: rgba(0, 255, 136, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
      transform: scale(1.05);
    }

    .controlBtn:active {
      transform: scale(0.98);
    }

    .statusText {
      position: fixed;
      top: 40px;
      left: 40px;
      color: #00ff88;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
      letter-spacing: 1px;
      z-index: 1000;
    }

    @media (max-width: 768px) {
      .controls {
        top: 20px;
        right: 20px;
        gap: 10px;
      }

      .controlBtn {
        padding: 10px 16px;
        font-size: 12px;
      }

      .statusText {
        top: 20px;
        left: 20px;
        font-size: 14px;
      }

      .voiceIndicator {
        bottom: 20px;
        font-size: 12px;
      }
    }

    .transcriptBox {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 600px;
      width: 90%;
      background: rgba(0, 20, 40, 0.95);
      border: 2px solid #00ff88;
      border-radius: 8px;
      padding: 20px;
      color: #00ff88;
      font-size: 14px;
      z-index: 999;
      display: none;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
      max-height: 150px;
      overflow-y: auto;
    }

    .transcriptBox.visible {
      display: block;
    }

    .transcriptBox strong {
      color: #00ffff;
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .responseBox {
      position: fixed;
      top: 140px;
      right: 40px;
      max-width: 350px;
      background: rgba(0, 20, 40, 0.95);
      border: 2px solid #ff6600;
      border-radius: 8px;
      padding: 20px;
      color: #ff6600;
      font-size: 13px;
      z-index: 999;
      display: none;
      text-shadow: 0 0 10px rgba(255, 102, 0, 0.6);
      max-height: 300px;
      overflow-y: auto;
    }

    .responseBox.visible {
      display: block;
    }

    .responseBox strong {
      color: #ffaa00;
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <canvas id="mainCanvas"></canvas>

  <div class="statusText" id="statusText">JARVIS ONLINE</div>

  <div class="controls">
    <button class="controlBtn" id="listenBtn">🎤 LISTEN</button>
    <button class="controlBtn" id="stopBtn">⏹️ STOP</button>
    <button class="controlBtn" id="resetBtn">↻ RESET</button>
  </div>

  <div class="voiceIndicator" id="voiceIndicator">
    READY FOR VOICE COMMAND
    <span class="listeningDot" id="listeningDot" style="display: none;"></span>
  </div>

  <div class="transcriptBox" id="transcriptBox">
    <strong>YOU SAID:</strong>
    <div id="transcriptText"></div>
  </div>

  <div class="responseBox" id="responseBox">
    <strong>JARVIS RESPONSE:</strong>
    <div id="responseText"></div>
  </div>

  <script src="jarvisData.js"></script>
  <script src="jarvisCore.js"></script>
</body>
</html>
